# The driving acceptance plan for the v18 caching-OIDC backport: generic_oidc, kubernetes,
# and oidc_caching composed into ONE cluster, sharing the oidc-server component. All three
# exercise the shared oidc.CachingTokenValidator (generic_oidc discovery agents + the kube
# `oidc` bot), so a regression in the caching library shows up as a path failing. The kube
# `static_jwks` bot additionally proves kube joining works off the shared IdP, and
# oidc_caching asserts the caching itself — many joins, one discovery fetch — directly.
#
#   run-plan oidc-caching --repo ~/projects/teleport-e --features generic_oidc,kubernetes --version v18
#
# Each module gates independently, so on a target with only `kubernetes` (e.g. teleport-e)
# generic_oidc SKIPs while kubernetes + oidc_caching run.
name: oidc-caching
description: >
  generic_oidc + kubernetes + oidc_caching sharing one oidc-server: exercise the shared
  caching OIDC validator across both join paths AND assert the caching directly (many joins,
  one discovery fetch) — the v18 caching backport's regression surface.
modules: [generic_oidc, kubernetes, oidc_caching]
