# Render context for terraform_bot (see harness/render.py).
# Pulls in the shared terraform-runner component (provider build + tf-admin identity +
# tf-identity volume). The runner service below authenticates the provider with that
# identity and applies tf/main.tf.
components: [terraform-runner]
# Terraform engine (this module owns the runner container). Swap to OpenTofu later with:
#   tf_image: ghcr.io/opentofu/opentofu:1.8   tf_bin: tofu
# (dev_overrides + skip-init are identical across both engines.)
tf_image: hashicorp/terraform:1.9
tf_bin: terraform
