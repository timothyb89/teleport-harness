# Minimal role for the test bot: enough to prove its produced identity actually
# authenticates and performs an authorized action (list tokens) via tctl --identity.
# Applied via the normal bootstrap path (the role isn't the resource under test).
kind: role
version: v7
metadata:
  name: tbot-tester
spec:
  allow:
    rules:
      - resources: [token]
        verbs: [read, list]
