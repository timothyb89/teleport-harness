# Render context for bound_keypair_apply_on_startup (see harness/render.py).
reg_secret: harness-bk-regsecret      # positive bot's registration secret (also pinned in checks.py)
wrong_secret: wrong-bk-secret         # negative bot's (rejected) registration secret
# bk-bot is created at bootstrap with an EMPTY token: the join is authorized by the
# bound_keypair token teleport applies on startup (apply_on_startup/token.yaml.j2, bot_name-matched),
# NOT by a bootstrap `tctl create` token. This is what isolates the apply-on-startup code path.
bots:
  - {name: bk-bot, roles: tbot-tester}
