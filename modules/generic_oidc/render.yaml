# Render context for generic_oidc (see harness/render.py).
components: [oidc-server]              # shared IdP that mints/serves the OIDC JWTs
# Image for the module-local self-signed `oidc-ca` issuer. Same image the oidc-server
# component builds; named here because module fragments don't see component render vars.
oidc_image: teleport-harness-oidc:latest
auth_env:
  TELEPORT_UNSTABLE_SCOPES: "yes"      # scoped tokens/roles/bots need this on auth
bot_token: harness-tokmgr-secret       # token-manager bot join secret (per-cluster)
agent_sub: test-agent                  # subject the positive agents request / rules match
# positive (discovery/static/scoped-*) + negative (deny/scoped-deny) agents
agents: [discovery, static, scoped-discovery, scoped-static, deny, scoped-deny]
# bots that join via generic_oidc (tbot). Each pairs a trust mode (custom-CA
# discovery vs static_jwks) with scoped/unscoped. The token-manager mints their
# provision tokens at runtime; scoped bots are created via bootstrap scoped_bot
# resources, unscoped ones via the `bots:` manifest below.
oidc_bots: [gobot-disc, gobot-static, gobot-scoped-disc, gobot-scoped-static]
# bots created at bootstrap: name / roles / join token.
#   token-manager  joins via the classic `token` method (secret == the token name).
#   gobot-disc / gobot-static join via generic_oidc — empty token here just creates
#   the bot user; the generic_oidc provision token (created at runtime by the
#   token-manager, bot_name-matched) authorizes the join. The scoped bots are NOT
#   here — they are scoped_bot resources in bootstrap/ (can't be made by `bots add`).
bots:
  - {name: token-manager, roles: token-admin, token: harness-tokmgr-secret}
  - {name: gobot-disc, roles: go-bot-tester}
  - {name: gobot-static, roles: go-bot-tester}
