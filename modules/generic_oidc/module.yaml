# Metadata for the generic_oidc test module. Consumed by the plan runner for
# feature/version gating and by humans browsing the harness.
name: generic_oidc
description: >
  generic_oidc join method — Teleport agents (Nodes) join by presenting OIDC JWTs
  minted by a trivial in-cluster OIDC server, validated via discovery+tls_ca and
  static_jwks, unscoped and scoped, with negative (must-be-denied) cases. Join
  tokens are created by a tbot identity, not cluster admin.

# Capability this module exercises; the plan runner gates cases on the target
# actually providing it.
provides_feature: generic_oidc
requires_features: [generic_oidc]
min_version: v18                # generic_oidc lands in v18 (backport target)

# Verification cases — the SOURCE OF TRUTH, executed by lib/verify.sh through the
# shared assertion primitives in lib/assert.sh. Each line is "<assert-verb> <args...>";
# args reference the nodename suffix after "<id>-". Anything not expressible here goes
# in checks.sh (a sourced bash escape hatch that shares the same asserts + node data).
checks: |
  # positive: agents must join (discovery + static_jwks, unscoped + scoped)
  node_present agent-discovery
  node_present agent-static
  node_present agent-scoped-discovery
  node_present agent-scoped-static
  # scoped agents must be pinned to their assigned scope
  node_scope   agent-scoped-discovery /genericoidc-test
  node_scope   agent-scoped-static /genericoidc-test
  # negative: wrong subject claim -> must be denied (absent) + a denial in the log
  node_absent  agent-deny
  node_absent  agent-scoped-deny
  log_contains agent-deny unable to (join via|validate) generic_oidc|denied
  log_contains agent-scoped-deny unable to (join via|validate) generic_oidc|denied
