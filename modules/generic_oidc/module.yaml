# Metadata for the generic_oidc test module. Consumed by the plan runner for
# feature/version gating and by humans browsing the harness.
name: generic_oidc
description: >
  generic_oidc join method — Teleport agents (Nodes) AND bots (tbot) join by
  presenting OIDC JWTs minted by trivial in-cluster OIDC servers, validated via
  discovery (over a custom CA and over system trust) and static_jwks, unscoped and
  scoped, with negative (must-be-denied) cases. Join tokens are created by a tbot
  identity, not cluster admin.

# Capability this module exercises; the plan runner gates cases on the target
# actually providing it.
provides_feature: generic_oidc
requires_features: [generic_oidc]
min_version: v18                # generic_oidc lands in v18 (backport target)

# Verification cases — the SOURCE OF TRUTH, run by the Python verifier (harness/verify.py).
# Each line is "<verb> <args...>"; args reference the nodename suffix after "<id>-".
# Anything not expressible here goes in an optional Python checks.py escape hatch.
checks: |
  # positive: agents must join (discovery + static_jwks, unscoped + scoped)
  node_present agent-discovery
  node_present agent-static
  node_present agent-scoped-discovery
  node_present agent-scoped-static
  # positive: agent whose token uses a predicate EXPRESSION allow rule
  # (contains(set(claims.groups), "dev")) matching a string-ARRAY claim — proves
  # set() flattens a JSON array into a Set the built-in set functions can query.
  node_present agent-expr
  # scoped agents must be pinned to their assigned scope
  node_scope   agent-scoped-discovery /genericoidc-test
  node_scope   agent-scoped-static /genericoidc-test
  # negative: wrong subject claim -> must be denied (absent) + a denial in the log
  node_absent  agent-deny
  node_absent  agent-scoped-deny
  log_contains agent-deny unable to (join via|validate) generic_oidc|denied
  log_contains agent-scoped-deny unable to (join via|validate) generic_oidc|denied
  # negative: same expression token, but the requested `groups` array omits "dev",
  # so the expression is false and the join is denied (proves it's evaluated).
  node_absent  agent-expr-deny
  log_contains agent-expr-deny unable to (join via|validate) generic_oidc|denied
  # exact totals: the five expected agents joined (nothing extra), two of them scoped
  node_count         5
  scoped_node_count  /genericoidc-test 2
  # the agent tokens were created THROUGH the token-manager bot identity, not cluster
  # admin: inspect the structured join_token.create audit event and assert its
  # impersonator field (renders the FULL event as pretty-JSON proof).
  audit_event        join_token.create impersonator=bot-token-manager
  # --- BOTS: tbot joins via generic_oidc (custom-CA discovery + static_jwks) -------
  # positive: each bot's join emits a successful bot.join audit event on auth...
  bot_joined         gobot-disc generic_oidc
  bot_joined         gobot-static generic_oidc
  bot_joined         gobot-scoped-disc generic_oidc
  bot_joined         gobot-scoped-static generic_oidc
  # ...and tbot wrote an identity artifact (only happens after a successful join).
  output_file        gobot-disc /out/id/identity
  output_file        gobot-static /out/id/identity
  output_file        gobot-scoped-disc /out/id/identity
  output_file        gobot-scoped-static /out/id/identity
  # the unscoped bot identities can perform an authorized action (list tokens).
  identity_authorized gobot-disc /out/id/identity
  identity_authorized gobot-static /out/id/identity
  # the scoped bot identities are pinned to their scope (via `tsh status`)...
  identity_scope     gobot-scoped-disc /out/id/identity /genericoidc-test
  identity_scope     gobot-scoped-static /out/id/identity /genericoidc-test
  # ...and are practically usable: each scoped bot can `tsh ssh` (as root) into a
  # scoped agent within its scope, running a real command end-to-end.
  tsh_ssh_as         gobot-scoped-disc /out/id/identity agent-scoped-discovery root
  tsh_ssh_as         gobot-scoped-static /out/id/identity agent-scoped-static root
