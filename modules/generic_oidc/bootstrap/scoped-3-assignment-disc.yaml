# Links the scoped discovery bot to the scoped role within /genericoidc-test, so the
# joined identity actually carries permissions (and scope pins).
kind: scoped_role_assignment
sub_kind: dynamic
version: v1
metadata:
  name: gobot-scoped-disc-assignment
scope: /genericoidc-test
spec:
  # scope-qualified bot name (<scope>::<bot-name>).
  bot: /genericoidc-test::gobot-scoped-disc
  assignments:
    # The sub-assignment role is ALSO referenced by scope-qualified name
    # (<roleScope>::<roleName>) since the namespacing change (gravitational#68457,
    # on master + this v18 backport). A bare name fails validation ("missing '::'
    # separator"). See lib/scopes/access/access.go ValidateAssignment.
    - role: /genericoidc-test::generic-oidc-scoped-role
      scope: /genericoidc-test
