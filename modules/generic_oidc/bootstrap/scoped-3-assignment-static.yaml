# Links the scoped static_jwks bot to the scoped role within /genericoidc-test.
kind: scoped_role_assignment
sub_kind: dynamic
version: v1
metadata:
  name: gobot-scoped-static-assignment
scope: /genericoidc-test
spec:
  # scope-qualified bot name (<scope>::<bot-name>).
  bot: /genericoidc-test::gobot-scoped-static
  assignments:
    # Scope-qualified role name (<roleScope>::<roleName>) — see the disc variant's
    # note: required since the namespacing change (gravitational#68457) on master +
    # this v18 backport; a bare name fails validation.
    - role: /genericoidc-test::generic-oidc-scoped-role
      scope: /genericoidc-test
