# Shared harness ingress: L4 SNI-passthrough router.
#
# Routes by TLS SNI without terminating TLS (ssl_preread), so each cluster's Teleport
# proxy still does its own TLS-ALPN multiplexing. Per-cluster routes live in
# /etc/nginx/dynamic/<id>.map (one `<fqdn> <container>:<port>;` line each); the harness
# writes/removes them on cluster up/down and reloads nginx.
#
# No docker socket needed (lima restricts it even for root containers).

worker_processes auto;
events {}

stream {
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SNI -> backend "host:port". Unknown SNI maps to empty -> connection closed.
    map $ssl_preread_server_name $backend {
        hostnames;
        include /etc/nginx/dynamic/*.map;
        default "";
    }

    server {
        listen 443;
        ssl_preread on;
        proxy_pass $backend;
        proxy_connect_timeout 5s;
        proxy_timeout 1h;
    }
}
